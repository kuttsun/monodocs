# GitLab CI — monodocs 公式サイト（site/）を GitLab Pages へデプロイする。
#
# 公開 URL: https://<namespace>.gitlab.io/<project>/
#   例: https://kuttsun.gitlab.io/monodocs/
# project pages はサブパス配信なので base はプロジェクト名（/monodocs/）。
# CI_PROJECT_NAME から自動算出する（独自ドメイン等で変えたい場合は SITE_BASE を上書き）。
#
# ジョブの流れ:
#   1) monodocs CLI 本体をビルド（app/、pnpm を corepack で解決）
#   2) その CLI で同梱 examples を単一 HTML 化し site/public/manual.html に出力（ドッグフーディング）
#   3) VitePress でサイトをビルド（SITE_BASE=/<project>/）
#   4) 生成物を public/ に集約（GitLab Pages の規約）

pages:
  stage: deploy
  image: node:22-bookworm-slim
  variables:
    # GitLab Pages の project pages はサブパス配信（例: /monodocs/）。
    SITE_BASE: "/$CI_PROJECT_NAME/"
    # pnpm の store をプロジェクト配下に置き、キャッシュ対象にする。
    PNPM_STORE: "$CI_PROJECT_DIR/.pnpm-store"
  cache:
    - key:
        files:
          - app/pnpm-lock.yaml
      paths:
        - .pnpm-store/
    - key:
        files:
          - site/package-lock.json
      paths:
        - site/node_modules/
  script:
    # 1) monodocs CLI 本体をビルド（packageManager 指定を corepack で解決）
    - corepack enable
    - (cd app && pnpm install --frozen-lockfile --store-dir "$PNPM_STORE" && pnpm build)
    # 2) ドッグフーディング: 同梱 examples を単一 HTML 化して併載
    - node app/packages/cli/dist/index.js build app/examples/docs -o site/public/manual.html
    # 3) VitePress ビルド（サブパス base）
    - (cd site && npm ci && npm run docs:build)
    # 4) GitLab Pages 規約に合わせ public/ へ集約
    - rm -rf public
    - cp -r site/.vitepress/dist public
  artifacts:
    paths:
      - public
  rules:
    # 既定ブランチへの push のときだけデプロイする。
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
