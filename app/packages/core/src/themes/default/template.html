<!doctype html>
<html lang="ja"{{htmlAttrs}}>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{title}}</title>
    <style>
{{style}}
    </style>
  </head>
  <body>
    <button
      id="sidebar-show"
      type="button"
      aria-label="Open sidebar"
      title="Open sidebar"
    >
      ☰
    </button>
    <div id="app">
      <aside id="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">{{title}}</span>
          <button
            id="sidebar-toggle"
            type="button"
            aria-label="Close sidebar"
            title="Close sidebar"
            aria-expanded="true"
          >
            «
          </button>
        </div>
        <div class="sidebar-tools">
          <input
            id="search-input"
            type="search"
            placeholder="Search…"
            autocomplete="off"
            aria-label="Search documents"
          />
          <button
            id="theme-toggle"
            type="button"
            aria-label="Toggle dark mode"
            title="Toggle dark mode"
          >
            <span class="theme-toggle-icon"></span>
          </button>
        </div>
        <ul id="search-results" hidden></ul>
        <nav id="sidebar-nav">
{{sidebar}}
        </nav>
      </aside>
      <main id="content">
{{pages}}
        <nav id="page-nav" aria-label="Page navigation"></nav>
      </main>
      <aside id="toc" aria-label="Table of contents">
        <div class="toc-title">On this page</div>
        <nav id="toc-nav"></nav>
      </aside>
    </div>
    <script>
      window.__MONODOCS_DATA__ = {{siteDataJson}};
    </script>
    <script>
{{appJs}}
    </script>
{{bodyScripts}}
  </body>
</html>
