name: Deploy site

# Builds the VitePress site (including the monodocs-generated single-file demos)
# and publishes it to GitHub Pages.
#
# The build runs entirely inside the project's dev Docker image (Dockerfile.dev),
# reusing the same scripts used for local builds so CI and local produce the site
# the same way:
#   scripts/app.sh pnpm install   -> builds the monodocs-dev image and installs app deps
#   scripts/site-build.sh         -> CLI build -> single-file demos -> VitePress build
#
# Prerequisite (already configured): Settings -> Pages -> Source: GitHub Actions.
#
# The site is served from the project-pages subpath (https://<owner>.github.io/monodocs/),
# so the build sets SITE_BASE=/monodocs/ (see site/.vitepress/config.ts).

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'app/**'
      - 'examples/**'
      - 'scripts/**'
      - 'Dockerfile.dev'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish rather than cancel it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site (Docker)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # First use of scripts/app.sh builds the monodocs-dev image from Dockerfile.dev.
      # site-build.sh assumes app dependencies are present, so install them here.
      - name: Build dev image and install app dependencies
        run: scripts/app.sh pnpm install

      # Builds the CLI, regenerates the single-file demos into site/public, and runs
      # the VitePress production build into site/.vitepress/dist — all inside Docker.
      - name: Build site in Docker
        run: SITE_BASE=/monodocs/ scripts/site-build.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/.vitepress/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
