name: Release npm package

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm
    defaults:
      run:
        working-directory: app

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release tag and package version
        id: release
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          package_version="$(node -p "require('./packages/cli/package.json').version")"
          expected_tag="v${package_version}"

          if [ "$RELEASE_TAG" != "$expected_tag" ]; then
            echo "Release tag $RELEASE_TAG does not match package version $expected_tag" >&2
            exit 1
          fi

          if [[ "$package_version" == *-* ]]; then
            npm_tag="next"
            if [ "$RELEASE_IS_PRERELEASE" != "true" ]; then
              echo "Prerelease version $package_version must use a GitHub prerelease" >&2
              exit 1
            fi
          else
            npm_tag="latest"
            if [ "$RELEASE_IS_PRERELEASE" != "false" ]; then
              echo "Stable version $package_version must use a stable GitHub release" >&2
              exit 1
            fi
          fi

          echo "npm_tag=$npm_tag" >> "$GITHUB_OUTPUT"

      - name: Run application checks
        run: pnpm ci:check

      - name: Verify installable npm package
        run: pnpm package:verify

      - name: Install Trusted Publishing-compatible npm
        run: npm install --global npm@11.15.0

      - name: Publish package
        run: npm publish dist/npm/monodocs --access public --tag "${{ steps.release.outputs.npm_tag }}" --provenance
