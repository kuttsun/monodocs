name: Bootstrap first npm publish

# One-shot workflow used ONLY for the very first publish of `monodocs` to npm.
# npm Trusted Publishing (OIDC) can only be configured for a package that already
# exists, so this workflow authenticates with a temporary NPM_TOKEN secret to
# create the package, while still generating provenance from CI.
#
# After the first publish:
#   1. Configure Trusted Publishing for `monodocs` on npmjs.com.
#   2. Delete the NPM_TOKEN repository secret.
#   3. Delete this workflow file (release.yml handles all subsequent releases).
#
# Requires:
#   - Repository secret NPM_TOKEN (granular, packages read-write, short expiry).
#   - The `npm` GitHub Environment with required reviewers, to gate publication.

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Bootstrap publish to npm
    runs-on: ubuntu-latest
    environment: npm
    env:
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
    defaults:
      run:
        working-directory: app

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve npm dist-tag
        id: release
        run: |
          package_version="$(node -p "require('./packages/cli/package.json').version")"
          if [[ "$package_version" == *-* ]]; then
            npm_tag="next"
          else
            npm_tag="latest"
          fi
          echo "Publishing ${package_version} to dist-tag ${npm_tag}"
          echo "npm_tag=${npm_tag}" >> "$GITHUB_OUTPUT"

      - name: Run application checks
        run: pnpm ci:check

      - name: Verify installable npm package
        run: pnpm package:verify

      - name: Install Trusted Publishing-compatible npm
        run: npm install --global npm@11.15.0

      - name: Publish package
        run: npm publish dist/npm/monodocs --access public --tag "${{ steps.release.outputs.npm_tag }}" --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
